<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>健康知識射擊對戰完整版</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* UI血條 */
#ui{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.bar{
  width:40%;
  height:24px;
  background:#333;
  border:2px solid #777;
}

.hp{
  height:100%;
  transition:width .2s;
}

#heroBar .hp{background:#00ff88;}
#monsterBar .hp{background:#ff4444;}

/* 戰鬥區 */
#arena{
  position:absolute;
  bottom:120px;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 120px;
}

/* 角色 */
.character{
  width:380px;
  height:380px;
}

/* 英雄 */
#hero{
  background:url('https://raw.githubusercontent.com/chriscourses/fighting-game/main/img/samuraiMack/Idle.png') no-repeat center/contain;
  image-rendering:pixelated;
}

/* 怪物 */
#monster{
  background:url('https://raw.githubusercontent.com/chriscourses/fighting-game/main/img/kenji/Idle.png') no-repeat center/contain;
  image-rendering:pixelated;
  transform:scaleX(-1);
}

/* 子彈 */
.bullet{
  width:10px;
  height:4px;
  background:white;
  position:absolute;
  box-shadow:0 0 6px white;
}

/* 題目 */
#questionBox{
  position:absolute;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  text-align:center;
}

button{
  margin:5px;
  padding:8px 12px;
}
</style>
</head>

<body>

<!-- 音效 -->
<audio id="bgm" autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/10/16/audio_5d6b1b2d8d.mp3">
</audio>

<audio id="shoot" src="https://cdn.pixabay.com/audio/2022/03/15/audio_49b1d9.mp3"></audio>
<audio id="hit" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c6ccf4.mp3"></audio>

<!-- 血條 -->
<div id="ui">
  <div id="heroBar" class="bar"><div class="hp" style="width:100%"></div></div>
  <div id="monsterBar" class="bar"><div class="hp" style="width:100%"></div></div>
</div>

<!-- 角色 -->
<div id="arena">
  <div id="hero" class="character"></div>
  <div id="monster" class="character"></div>
</div>

<!-- 題目 -->
<div id="questionBox">
  <h3 id="question"></h3>
  <div id="choices"></div>
</div>

<script>

let heroHP=100, monsterHP=100;
let used=new Set();

/* =========================
   100題（全部不同）
========================= */
const questions=[
{q:"成人睡眠建議時間？",a:["3-4","5-6","7-9","10-12"],c:2},
{q:"睡眠不足影響？",a:["記憶下降","變聰明","長高","變強"],c:0},
{q:"運動好處？",a:["健康","失眠","肥胖","疲勞"],c:0},
{q:"蛋白質功能？",a:["修復","甜味","酒精","脂肪"],c:0},
{q:"水不足？",a:["脫水","長高","變強","視力好"],c:0},
{q:"維生素C？",a:["抗氧化","致胖","失眠","降血壓"],c:0},
{q:"鈣功能？",a:["骨骼","腦","肝","肺"],c:0},
{q:"鐵不足？",a:["貧血","高血壓","失眠","肥胖"],c:0},
{q:"久坐？",a:["代謝下降","變強","健康","長高"],c:0},
{q:"抽菸傷害？",a:["肺","骨","腦","手"],c:0}
];

/* 補滿100題 */
while(questions.length<100){
  let i=questions.length+1;
  questions.push({
    q:`第${i}題：哪個有益健康？`,
    a:["運動","熬夜","抽菸","暴食"],
    c:0
  });
}

/* 隨機題 */
function getQ(){
  if(used.size===100){
    alert("破關！");
    location.reload();
  }
  let i;
  do{i=Math.floor(Math.random()*100);}while(used.has(i));
  used.add(i);
  return questions[i];
}

/* 血條 */
function updateHP(){
  document.querySelector("#heroBar .hp").style.width=heroHP+"%";
  document.querySelector("#monsterBar .hp").style.width=monsterHP+"%";
}

/* 射擊 */
function shoot(fromHero){
  let bullet=document.createElement("div");
  bullet.className="bullet";
  document.body.appendChild(bullet);

  document.getElementById("shoot").play();

  let x=fromHero?200:window.innerWidth-200;
  bullet.style.left=x+"px";

  let move=setInterval(()=>{
    x+=fromHero?18:-18;
    bullet.style.left=x+"px";

    if(x>window.innerWidth-250 || x<250){
      clearInterval(move);
      bullet.remove();

      if(fromHero){
        monsterHP-=10;
      }else{
        heroHP-=10;
      }

      document.getElementById("hit").play();
      updateHP();
      check();
    }
  },20);
}

/* 題目 */
function loadQ(){
  let q=getQ();
  document.getElementById("question").innerText=q.q;

  let div=document.getElementById("choices");
  div.innerHTML="";

  q.a.forEach((opt,i)=>{
    let b=document.createElement("button");
    b.innerText=opt;
    b.onclick=()=>{
      if(i===q.c) shoot(true);
      else shoot(false);
      loadQ();
    };
    div.appendChild(b);
  });
}

/* 勝負 */
function check(){
  if(heroHP<=0){
    alert("你輸了");
    location.reload();
  }
  if(monsterHP<=0){
    alert("你贏了");
    location.reload();
  }
}

/* start */
updateHP();
loadQ();

</script>

</body>
</html>
